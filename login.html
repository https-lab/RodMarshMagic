<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | Rodmarsh Magic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="images/rodmarsh magic logo.png" alt="Rodmarsh Magic Logo" onerror="this.src='https://placehold.co/100x100?text=RM+Logo'">
            <div class="business-name">Rodmarsh Magic</div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="orders.html">ORDERS</a></li>
                <li><a href="login.html" class="active">LOGIN</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <a href="cart.html" title="Cart"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a>
            <a href="login.html" title="Member Login"><i class="fas fa-user"></i></a>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Member Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login to the Kingdom</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="#" style="color: var(--accent-color);">Sign up here</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="images/rodmarsh magic logo.png" alt="Rodmarsh Magic Logo" style="height: 120px; width: auto; margin-bottom: 20px;">
                <h4>Rodmarsh Magic</h4>
                <p>Indulge in clouds of sweetness.</p>
                <p><i class="fas fa-envelope"></i> jvasquez@immaculada.edu.ph</p>
            </div>
            <div class="footer-section">
                <h4>Newsletter</h4>
                <div class="form-group" style="display: flex; gap: 10px;">
                    <input type="email" placeholder="Your email address">
                    <button class="btn">Join</button>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Rodmarsh Magic. All rights reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
