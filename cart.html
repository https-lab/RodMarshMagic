<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | Rodmarsh Magic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="images/rodmarsh magic logo.png" alt="Rodmarsh Magic Logo" onerror="this.src='https://placehold.co/100x100?text=RM+Logo'">
            <div class="business-name">Rodmarsh Magic</div>
        </div>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="orders.html">ORDERS</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </nav>
        <div class="mobile-header-actions">
            <button class="burger-toggle" id="burger-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="main-nav">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="header-icons">
                <a href="cart.html" title="Cart"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <main class="products-container" style="min-height: 60vh;">
        <h2 class="section-title">Your Marshmallow Selection</h2>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Cart items will be rendered here by cart.js -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align: right; font-weight: bold; font-size: 1.5rem;">Total:</td>
                    <td id="cart-total" style="font-weight: bold; font-size: 1.5rem;">₱0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <div style="text-align: right; margin-top: 20px;">
            <a href="products.html" class="btn" style="background-color: var(--accent-color); margin-right: 10px;">Continue Shopping</a>
            <button id="checkout-btn" class="btn">Proceed to Checkout</button>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="images/rodmarsh magic logo.png" alt="Rodmarsh Magic Logo" style="height: 120px; width: auto; margin-bottom: 20px;">
                <h4>Rodmarsh Magic</h4>
                <p>Indulge in clouds of sweetness.</p>
                <p><i class="fas fa-envelope"></i> jvasquez@immaculada.edu.ph</p>
            </div>
            <div class="footer-section">
                <h4>Newsletter</h4>
                <div class="form-group" style="display: flex; gap: 10px;">
                    <input type="email" placeholder="Your email address">
                    <button class="btn">Join</button>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Rodmarsh Magic. All rights reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
